server {
    listen 80;

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Proxy API calls to the backend container.
    # "be" is the service name from docker-compose - Docker's internal DNS resolves it.
    location /api/ {
        proxy_pass http://be:5000/api/;
    }
}
