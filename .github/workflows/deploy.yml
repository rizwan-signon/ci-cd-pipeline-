name: CI/CD Pipeline

# Runs every time you push to main
on:
  push:
    branches: [main]

jobs:
  # ---- STEP 1: Build both images and push them to Docker Hub ----
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./be
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/practice-be:latest

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./fe
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/practice-fe:latest

  # ---- STEP 2: SSH into the VM and redeploy using the new images ----
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy docker-compose.prod.yml to the VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "docker-compose.prod.yml"
          target: "~/practice-app"

      - name: SSH in and restart containers with the new images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            cd ~/practice-app
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            docker compose -f docker-compose.prod.yml pull
            docker compose -f docker-compose.prod.yml up -d
            docker image prune -f
